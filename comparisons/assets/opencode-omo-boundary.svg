  <text x="670" y="282" text-anchor="middle" fill="#fff" font-size="11" font-weight="600" font-family="system-ui,sans-serif">features/*</text>
  <text x="670" y="296" text-anchor="middle" fill="#e9d5ff" font-size="9" font-family="system-ui,sans-serif">Team / OpenClaw</text>
  <rect x="500" y="320" width="180" height="28" rx="6" fill="#9333ea"/>
  <text x="590" y="339" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" font-family="system-ui,sans-serif">policy, not loop/DB</text>

  <path d="M360 334 H440" stroke="#fcd34d" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M440 250 H360" stroke="#fcd34d" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="400" y="248" text-anchor="middle" fill="#fde68a" font-size="9" font-family="system-ui,sans-serif">hooks</text>
  <text x="400" y="358" text-anchor="middle" fill="#fde68a" font-size="9" font-family="system-ui,sans-serif">config write-back</text>

  <text x="40" y="396" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">kernel: loop, compaction, persistence | plugin: params, context, extra tools</text>
